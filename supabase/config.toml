# Supabase CLI configuration for the local dev stack.
#
# Usage (after installing https://supabase.com/docs/guides/cli):
#   supabase start          # boots Postgres + Studio + Auth + Inbucket via Docker
#   supabase db reset       # applies migrations and runs supabase/seed.sql
#   supabase stop           # stops the local stack
#
# When linking to a hosted project:
#   supabase link --project-ref <ref>
#   supabase db push        # applies migrations remotely
#
# See docs/supabase-setup.md for the full setup walkthrough.

project_id = "wobedibi"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/admin"]
jwt_expiry = 3600
# Single admin role per super prompt §5 — disable signups; create the admin
# user manually via Supabase Studio or `supabase auth users invite`.
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "5MiB"
