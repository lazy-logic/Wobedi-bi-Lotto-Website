# nginx vhost for the Wobedi Bi Lotto marketing site.
#
# NOTE on the rebrand transition: the on-server paths (/home/admin/accurate-giant/,
# the supervisor program name, the SSL cert filenames) still use the legacy
# `accurate-giant` slug because they're tied to live infrastructure. When the
# cutover to the new domain (wobedibilotto.com) and a fresh deploy layout
# happens, rename the matching paths in lockstep and reissue the Cloudflare
# Origin Cert for the new hostname.
#
# Two server blocks:
#   1. :80  — keeps working for direct HTTP hits (e.g. CF on "Flexible" mode,
#             or a visitor who types http:// directly).
#   2. :443 — uses a Cloudflare Origin Certificate (15-year, RSA 2048).
#             Required when Cloudflare's SSL/TLS mode is set to Full or
#             Full (strict).
#
# Both forward to the Node standalone server on 127.0.0.1:3002 (managed by
# Supervisor — see /etc/supervisor/conf.d/accurate-giant.conf).
#
# The Origin Certificate is only trusted by Cloudflare (not browsers) —
# direct https:// hits to the origin IP will show a cert warning, which is
# correct behaviour. Cloudflare in "Full (strict)" mode validates this cert.

# Reusable proxy block — same for both HTTP and HTTPS server blocks.
# Lives inline rather than as a snippets/ include because the surrounding
# admin convention is to keep one file per site.

server {
    listen 80;
    listen [::]:80;
    server_name accurategiant.com www.accurategiant.com;

    access_log /var/log/nginx/accurate-giant.access.log;
    error_log  /var/log/nginx/accurate-giant.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
        proxy_buffering                    off;
        proxy_read_timeout                 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name accurategiant.com www.accurategiant.com;

    ssl_certificate     /etc/ssl/cloudflare/accurategiant.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/accurategiant.com.key;

    # Modern, widely-supported TLS profile.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/accurate-giant.access.log;
    error_log  /var/log/nginx/accurate-giant.error.log;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
        proxy_buffering                    off;
        proxy_read_timeout                 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
